defaults:
  - base_system

name: 'mini_cheetah'
subgroup_id: null
group: 'K4xC2'

max_epochs: 200
early_stop_epochs: 30
standardize: True

obs_state_ratio: 5                             # obs_state_dim = obs_state_ratio * state_dim

state_obs: ['joint_pos_S1', 'joint_vel', 'base_vel', 'base_ang_vel', 'projected_gravity', 'a_joint_pos_S1', 'velocity_commands_xy', 'velocity_commands_z'] # no base pose
action_obs: ['current_action_S1'] # no base pose

# dt = 0.0012 s   this is the average delta time between observations.
frames_per_state:  1                                 # Number of time-frames to use as a Markov Process state time step
pred_horizon:      5 #30                                # Number (or percentage) of Markov Process state time steps to predict into the future
eval_pred_horizon: ${system.pred_horizon}            # Number (or percentage) of Markov Process state time steps to predict into the future
test_pred_horizon: 100

recording_type: isaaclab # raysim
# terrain: flat
terrain: curriculum
# dynamic_mode: forward_minus_0_4
dynamic_mode: 2025-05-16_16-16-41 # no base pose
# dynamic_mode: 2025-05-16_16-22-18 # base pose

data_path: '${system.name}/${system.recording_type}_recordings/${system.terrain}/${system.dynamic_mode}'

summary: S:${system.dynamic_mode}-OS:${system.obs_state_ratio}-G:${system.group}-H:${system.pred_horizon}-EH:${system.eval_pred_horizon}