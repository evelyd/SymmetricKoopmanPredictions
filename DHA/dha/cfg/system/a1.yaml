defaults:
  - base_system

name: 'a1'
subgroup_id: null
group: 'C2'

max_epochs: 200
early_stop_epochs: 30
standardize: True

obs_state_ratio: 3                             # obs_state_dim = obs_state_ratio * state_dim

# state_obs: ['joint_pos_S1', 'joint_vel', 'base_vel', 'base_ang_vel', 'projected_gravity'] # no base pose
state_obs: ['projected_gravity', 'projected_forward_vec', 'joint_pos', 'prev_actions', 'phase_input', 'base_pos', 'door_bottom_corner_pos', 'door_normal_vec', 'lr_vec'] # push door
# state_obs: ['projected_gravity', 'projected_forward_vec', 'xy_commands', 'z_commands', 'joint_pos', 'joint_vel', 'prev_actions', 'clock_inputs'] # stand dance, walk slope
action_obs: ['actions']

# dt = 0.0012 s   this is the average delta time between observations.
frames_per_state:  1                                 # Number of time-frames to use as a Markov Process state time step
pred_horizon:      5 #30                                # Number (or percentage) of Markov Process state time steps to predict into the future
eval_pred_horizon: ${system.pred_horizon}            # Number (or percentage) of Markov Process state time steps to predict into the future
test_pred_horizon: 5

recording_type: isaacgym # raysim
# terrain: flat
# task: stand_dance_cyber
# task: push_door_cyber
task: walk_slope_cyber
# dynamic_mode: forward_minus_0_4
# dynamic_mode: 2025-05-16_16-16-41 # no base pose
# dynamic_mode: 20250521_203857 # base pose
dynamic_mode: 'from_weishu'

data_path: '${system.name}/${system.recording_type}_recordings/${system.task}/${system.dynamic_mode}'

summary: S:${system.dynamic_mode}-OS:${system.obs_state_ratio}-G:${system.group}-H:${system.pred_horizon}-EH:${system.eval_pred_horizon}
